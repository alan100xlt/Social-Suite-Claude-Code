name: Deploy Supabase (migrations + edge functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: yeffbytlvhhzsbrabhgh

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Push migrations
        run: supabase db push --linked

      - name: Deploy edge functions
        run: |
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            # Skip shared modules (not deployable)
            if [ "$fn_name" = "_shared" ]; then continue; fi
            echo "Deploying $fn_name..."
            supabase functions deploy "$fn_name" --no-verify-jwt=false 2>&1 || echo "Warning: $fn_name deploy had issues"
          done
